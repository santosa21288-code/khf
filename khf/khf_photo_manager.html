<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KHF Photo Manager — Product Images</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --ink0:#080808;--ink1:#0e0e0e;--ink2:#141414;--ink3:#1c1c1c;--ink4:#242424;--ink5:#2e2e2e;
  --red:#B3001B;--red-l:#e0001f;--red-d:rgba(179,0,27,.15);
  --gold:#C8A44D;--gold-l:#e8c068;--gold-d:rgba(200,164,77,.12);
  --green:#22a550;--green-d:rgba(34,165,80,.14);
  --t1:#f0ece4;--t2:#9e9a93;--t3:#5a5650;--t4:#3a3632;
  --b1:rgba(255,255,255,.06);--b2:rgba(255,255,255,.11);--b3:rgba(255,255,255,.18);
  --sans:'Inter',sans-serif;--serif:'Noto Serif JP',serif;--mono:'JetBrains Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);background:var(--ink0);color:var(--t1);min-height:100vh;font-size:14px;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--ink5);border-radius:4px}

/* HEADER */
.header{background:var(--ink1);border-bottom:1px solid var(--b1);padding:0 24px;position:sticky;top:0;z-index:100}
.header::before{content:'';display:block;height:3px;background:linear-gradient(90deg,var(--red),var(--gold));margin:0 -24px 0}
.header-inner{max-width:1280px;margin:0 auto;height:60px;display:flex;align-items:center;gap:16px}
.header-logo{font-family:var(--serif);font-size:16px;font-weight:700;color:var(--t1);display:flex;align-items:center;gap:8px}
.header-logo-icon{width:34px;height:34px;background:var(--red);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:17px}
.header-sub{font-size:11px;color:var(--t3);font-family:var(--mono)}
.header-spacer{flex:1}
.header-stats{display:flex;gap:16px}
.hs{text-align:center}
.hs-val{font-family:var(--mono);font-size:14px;font-weight:700;color:var(--t1)}
.hs-lbl{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px}

/* TOOLBAR */
.toolbar{background:var(--ink2);border-bottom:1px solid var(--b1);padding:12px 24px}
.toolbar-inner{max-width:1280px;margin:0 auto;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 15px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:none;font-family:var(--sans);transition:all .15s;white-space:nowrap}
.btn:active{transform:scale(.96)}
.btn-red{background:var(--red);color:#fff}.btn-red:hover{background:var(--red-l)}
.btn-gold{background:var(--gold-d);color:var(--gold-l);border:1px solid rgba(200,164,77,.25)}.btn-gold:hover{background:rgba(200,164,77,.2)}
.btn-ghost{background:transparent;color:var(--t2);border:1px solid var(--b2)}.btn-ghost:hover{color:var(--t1);background:rgba(255,255,255,.04)}
.btn-green{background:var(--green-d);color:var(--green);border:1px solid rgba(34,165,80,.25)}.btn-green:hover{background:rgba(34,165,80,.2)}
.search-wrap{position:relative;flex:1;min-width:200px;max-width:340px}
.search-wrap input{width:100%;background:var(--ink3);border:1px solid var(--b2);border-radius:8px;padding:8px 12px 8px 34px;color:var(--t1);font-size:12px;font-family:var(--sans)}
.search-wrap input:focus{outline:none;border-color:var(--gold)}
.search-wrap .si{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--t3);font-size:13px;pointer-events:none}
.filter-sel{background:var(--ink3);border:1px solid var(--b2);border-radius:8px;padding:8px 11px;color:var(--t1);font-size:12px;font-family:var(--sans);-webkit-appearance:none;cursor:pointer}
.filter-sel:focus{outline:none;border-color:var(--gold)}
.filter-sel option{background:var(--ink2)}

/* PROGRESS BAR */
.progress-wrap{background:var(--ink2);border-bottom:1px solid var(--b1);padding:10px 24px;display:none}
.progress-wrap.show{display:block}
.progress-inner{max-width:1280px;margin:0 auto}
.progress-label{font-size:11px;color:var(--t3);margin-bottom:6px;display:flex;justify-content:space-between}
.progress-bar{height:4px;background:var(--ink5);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--red),var(--gold));border-radius:2px;transition:width .3s}

/* MAIN GRID */
.main{max-width:1280px;margin:0 auto;padding:20px 24px}
.prod-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px}

/* PRODUCT CARD */
.pc{background:var(--ink2);border:1px solid var(--b1);border-radius:14px;overflow:hidden;transition:border-color .2s;position:relative}
.pc:hover{border-color:var(--b2)}
.pc.has-img{border-color:rgba(34,165,80,.35)}
.pc.has-img .pc-status{background:var(--green-d);color:var(--green);border-color:rgba(34,165,80,.3)}
.pc.searching{border-color:rgba(200,164,77,.4)}
.pc.no-img{border-color:var(--b1)}

/* Image area */
.pc-img-wrap{position:relative;aspect-ratio:1;background:var(--ink3);overflow:hidden}
.pc-img-wrap img{width:100%;height:100%;object-fit:cover;display:block;transition:opacity .3s}
.pc-img-wrap img.loading{opacity:0}
.pc-emoji-fallback{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:52px}
.pc-img-overlay{position:absolute;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s;gap:8px}
.pc-img-wrap:hover .pc-img-overlay{opacity:1}
.pc-overlay-btn{padding:7px 12px;border-radius:7px;border:none;font-size:11px;font-weight:600;cursor:pointer;font-family:var(--sans);transition:all .15s}
.pc-overlay-btn-find{background:var(--gold);color:var(--ink0)}
.pc-overlay-btn-clear{background:rgba(179,0,27,.8);color:#fff}
.pc-spin{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.6);display:none}
.pc-spin.show{display:flex}
.spin{width:24px;height:24px;border:3px solid rgba(255,255,255,.15);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Card info */
.pc-info{padding:10px 12px 12px}
.pc-status{display:inline-flex;align-items:center;gap:4px;font-size:9px;font-weight:700;padding:2px 7px;border-radius:4px;margin-bottom:6px;border:1px solid;letter-spacing:.5px;background:var(--ink4);color:var(--t3);border-color:var(--b1)}
.pc-sku{font-family:var(--mono);font-size:10px;color:var(--gold);margin-bottom:2px}
.pc-name{font-size:12px;font-weight:600;color:var(--t1);margin-bottom:5px;line-height:1.3}
.pc-cat{font-size:10px;color:var(--t3)}
.pc-url-wrap{margin-top:8px;display:flex;gap:5px}
.pc-url-input{flex:1;background:var(--ink4);border:1px solid var(--b1);border-radius:6px;padding:5px 8px;color:var(--t1);font-size:10px;font-family:var(--mono);min-width:0}
.pc-url-input:focus{outline:none;border-color:var(--gold)}
.pc-url-input::placeholder{color:var(--t4)}
.pc-url-save{padding:5px 9px;background:var(--gold-d);border:1px solid rgba(200,164,77,.2);border-radius:6px;color:var(--gold-l);font-size:10px;font-weight:600;cursor:pointer;font-family:var(--sans);white-space:nowrap}
.pc-url-save:hover{background:rgba(200,164,77,.2)}

/* ALT IMAGES PICKER */
.alt-picker{background:var(--ink3);border:1px solid var(--b2);border-radius:10px;padding:10px;margin-top:8px;display:none}
.alt-picker.show{display:block}
.alt-picker-title{font-size:10px;color:var(--t3);margin-bottom:7px;text-transform:uppercase;letter-spacing:.5px}
.alt-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px}
.alt-img{aspect-ratio:1;border-radius:5px;overflow:hidden;cursor:pointer;border:2px solid transparent;transition:border-color .15s;background:var(--ink4)}
.alt-img:hover{border-color:var(--gold)}
.alt-img img{width:100%;height:100%;object-fit:cover}
.alt-img.selected{border-color:var(--green)}

/* TOAST */
.toast{position:fixed;bottom:20px;right:20px;background:var(--ink3);border:1px solid var(--b2);color:var(--t1);padding:10px 16px;border-radius:10px;font-size:13px;font-weight:500;z-index:9999;transform:translateY(60px);opacity:0;transition:all .3s;max-width:300px}
.toast.show{transform:translateY(0);opacity:1}
.toast.ok{border-color:rgba(34,165,80,.4);color:var(--green)}
.toast.err{border-color:rgba(179,0,27,.4);color:var(--red-l)}
.toast.info{border-color:rgba(200,164,77,.4);color:var(--gold-l)}

/* EXPORT MODAL */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:500;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.mo.open{opacity:1;pointer-events:all}
.modal{background:var(--ink2);border:1px solid var(--b2);border-radius:18px;width:640px;max-width:94vw;max-height:88vh;overflow:hidden;display:flex;flex-direction:column}
.mh{padding:16px 20px;border-bottom:1px solid var(--b1);display:flex;align-items:center;justify-content:space-between}
.mt{font-size:15px;font-weight:700;font-family:var(--serif);color:var(--t1)}
.mc{width:28px;height:28px;background:rgba(255,255,255,.07);border:none;border-radius:7px;color:var(--t2);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.mb{padding:20px;overflow-y:auto;flex:1}
.export-code{background:var(--ink1);border:1px solid var(--b1);border-radius:8px;padding:14px;font-family:var(--mono);font-size:11px;color:var(--t2);line-height:1.7;max-height:360px;overflow-y:auto;white-space:pre-wrap;word-break:break-all}
.mf{padding:13px 20px;border-top:1px solid var(--b1);display:flex;gap:8px;justify-content:flex-end}

/* EMPTY STATE */
.empty-state{text-align:center;padding:60px 20px;color:var(--t3)}
.empty-icon{font-size:48px;margin-bottom:14px}

/* RESPONSIVE */
@media(max-width:600px){
  .prod-grid{grid-template-columns:repeat(2,1fr)}
  .header-stats{display:none}
  .toolbar-inner{gap:7px}
}
</style>
</head>

<div class="toast" id="toast"></div>

<!-- EXPORT MODAL -->
<div class="mo" id="export-mo">
  <div class="modal">
    <div class="mh">
      <div class="mt">📋 Export Image URLs</div>
      <button class="mc" onclick="closeMo()">✕</button>
    </div>
    <div class="mb">
      <p style="font-size:12px;color:var(--t2);margin-bottom:14px">Copy this JavaScript object and paste it into your POS / Store HTML file to update all product images at once.</p>
      <div class="export-code" id="export-code"></div>
    </div>
    <div class="mf">
      <button class="btn btn-ghost" onclick="closeMo()">Close</button>
      <button class="btn btn-gold" onclick="copyExport()">📋 Copy to Clipboard</button>
      <button class="btn btn-green" onclick="downloadExport()">⬇ Download .js</button>
    </div>
  </div>
</div>

<!-- HEADER -->
<div class="header">

      </div>
    </div>
    <div class="header-spacer"></div>
    <div class="header-stats">

    </div>
  </div>
</div>

<!-- TOOLBAR -->
<div class="toolbar">

    <div class="search-wrap">

    </div>

    </select>
    <select class="filter-sel" id="status-filter" onchange="filterProds()">
      <option value="">All Status</option>
      <option value="has">✓ Has Photo</option>
      <option value="none">✗ No Photo</option>
    </select>
    <button class="btn btn-red" onclick="findAllPhotos()">🔍 Find All Photos</button>
    <button class="btn btn-ghost" onclick="stopSearch()" id="btn-stop" style="display:none">⏹ Stop</button>
    <button class="btn btn-gold" onclick="showExport()">📋 Export URLs</button>
    <button class="btn btn-green" onclick="saveToSheets()">☁ Save to Sheets</button>
  </div>
</div>

<!-- PROGRESS -->
<div class="progress-wrap" id="progress-wrap">
  <div class="progress-inner">
    <div class="progress-label">
      <span id="progress-label">Finding photos…</span>
      <span id="progress-pct">0%</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
  </div>
</div>

<!-- MAIN -->
<div class="main">
  <div class="prod-grid" id="prod-grid"></div>
</div>

/* ══════════════════════════════════════
   CONFIG
══════════════════════════════════════ */
const CFG = {
  SCRIPT_URL: 'https://script.google.com/macros/s/AKfycbwwXdba0q3DcY5fVjG3Zn4JRF3BCahn2qSOe7oug0xQTkDGdKm99f0Vn7WP3aks4pc/exec',
  USE_MOCK: false,
  // Free image search APIs (no key required)
  // Uses DuckDuckGo image search via public endpoint
  IMAGE_SOURCES: [
    'duckduckgo', // primary
    'bing',       // fallback
  ],
};

/* ══════════════════════════════════════
   STATE
══════════════════════════════════════ */
const S = {
  products: [],        // enriched with imageUrl
  filtered: [],
  searching: false,
  searchQueue: [],
  imageCache: {},      // sku → imageUrl
};

/* ══════════════════════════════════════
   INIT
══════════════════════════════════════ */
(function init() {
  // Load from localStorage if available
  const saved = loadSaved();
  S.products = ALL_PRODUCTS.map(p => ({
    ...p,
    imageUrl: saved[p.sku] || p.image || '',
  }));
  S.filtered = [...S.products];

  // Build category filter
  const cats = [...new Set(S.products.map(p => p.cat))].sort();
  document.getElementById('cat-filter').innerHTML =
    '<option value="">All Categories</option>' +
    cats.map(c => `<option>${c}</option>`).join('');

  renderGrid();
  updateStats();

  // Load images from Sheets in background
  if (!CFG.USE_MOCK) {
    loadImagesFromSheets();
  }
})();

async function loadImagesFromSheets() {
  try {
    const res = await fetch(CFG.SCRIPT_URL + '?action=getProducts');
    const data = await res.json();
    if (!data.ok || !data.products) return;
    let updated = 0;
    data.products.forEach(sp => {
      if (!sp.imageUrl) return;
      const p = S.products.find(x => x.sku === sp.sku);
      if (p && !p.imageUrl) {
        p.imageUrl = sp.imageUrl;
        updated++;
      }
    });
    if (updated > 0) {
      saveLocal();
      renderGrid();
      updateStats();
      console.log('[PM] Loaded ' + updated + ' images from Sheets');
    }
  } catch(e) {
    console.warn('[PM] Could not load from Sheets:', e);
  }
}

/* ══════════════════════════════════════
   LOCAL STORAGE (persist image URLs)
══════════════════════════════════════ */
function loadSaved() {
  try { return JSON.parse(localStorage.getItem('khf_img_urls') || '{}'); }
  catch { return {}; }
}
function saveLocal() {
  const data = {};
  S.products.forEach(p => { if (p.imageUrl) data[p.sku] = p.imageUrl; });
  try { localStorage.setItem('khf_img_urls', JSON.stringify(data)); } catch {}
}

/* ══════════════════════════════════════
   FILTER
══════════════════════════════════════ */
function filterProds() {
  const q = document.getElementById('search-inp').value.toLowerCase();
  const cat = document.getElementById('cat-filter').value;
  const status = document.getElementById('status-filter').value;
  S.filtered = S.products.filter(p => {
    if (cat && p.cat !== cat) return false;
    if (status === 'has' && !p.imageUrl) return false;
    if (status === 'none' && p.imageUrl) return false;
    if (q && !p.name.toLowerCase().includes(q) && !p.sku.toLowerCase().includes(q)) return false;
    return true;
  });
  renderGrid();
}

/* ══════════════════════════════════════
   RENDER GRID
══════════════════════════════════════ */
function renderGrid() {
  const grid = document.getElementById('prod-grid');
  if (!S.filtered.length) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">🔍</div><div>No products found</div></div>`;
    return;
  }
  grid.innerHTML = S.filtered.map(p => cardHTML(p)).join('');
}

    <div class="pc-img-wrap">
      ${hasImg
        ? `<img src="${p.imageUrl}" alt="${p.name}" loading="lazy" onerror="imgError('${p.sku}')">`
        : `<div class="pc-emoji-fallback">${p.emoji || '📦'}</div>`}
      <div class="pc-img-overlay">
        <button class="pc-overlay-btn pc-overlay-btn-find" onclick="findPhoto('${p.sku}')">🔍 Find Photo</button>
        ${hasImg ? `<button class="pc-overlay-btn pc-overlay-btn-clear" onclick="clearPhoto('${p.sku}')">✕ Clear</button>` : ''}
      </div>
      <div class="pc-spin" id="spin-${p.sku.replace(/[^a-zA-Z0-9]/g,'_')}">
        <div class="spin"></div>
      </div>
    </div>
    <div class="pc-info">
      <div class="pc-status">${hasImg ? '✓ HAS PHOTO' : '○ NO PHOTO'}</div>
      <div class="pc-sku">${p.sku}</div>
      <div class="pc-name">${p.name}</div>
      <div class="pc-cat">${p.cat} · ${p.sub}</div>
      <div class="pc-url-wrap">
        <input class="pc-url-input" type="text" placeholder="Paste image URL…"
          id="url-${p.sku.replace(/[^a-zA-Z0-9]/g,'_')}"
          value="${p.imageUrl || ''}"
          onchange="manualUrl('${p.sku}', this.value)">
        <button class="pc-url-save" onclick="manualUrl('${p.sku}', document.getElementById('url-${p.sku.replace(/[^a-zA-Z0-9]/g,'_')}').value)">Save</button>
      </div>
      <div class="alt-picker" id="alt-${p.sku.replace(/[^a-zA-Z0-9]/g,'_')}">
        <div class="alt-picker-title">Select best photo:</div>
        <div class="alt-grid" id="altgrid-${p.sku.replace(/[^a-zA-Z0-9]/g,'_')}"></div>
      </div>
    </div>
  </div>`;
}

function updateCard(sku) {
  const p = S.products.find(x => x.sku === sku);
  if (!p) return;
  const id = 'card-' + sku.replace(/[^a-zA-Z0-9]/g,'_');
  const el = document.getElementById(id);
  if (el) el.outerHTML = cardHTML(p);
  updateStats();
  saveLocal();
}

/* ══════════════════════════════════════
   IMAGE SEARCH
   Uses multiple free sources:
   1. DuckDuckGo instant answer API
   2. Open Graph via allorigins proxy
   3. Curated product image databases
══════════════════════════════════════ */
async function findPhoto(sku) {
  const p = S.products.find(x => x.sku === sku);
  if (!p) return;
  const skuId = sku.replace(/[^a-zA-Z0-9]/g,'_');
  const spin = document.getElementById('spin-' + skuId);
  if (spin) spin.classList.add('show');

  const results = await searchImages(p);
  if (spin) spin.classList.remove('show');

  if (results.length === 0) {
    toast(`No images found for "${p.name}"`, 'err');
    return;
  }

  // Show alt picker with results
  const altPicker = document.getElementById('alt-' + skuId);
  const altGrid = document.getElementById('altgrid-' + skuId);
  if (altPicker && altGrid) {
    altGrid.innerHTML = results.slice(0, 8).map((url, i) =>
      `<div class="alt-img" onclick="selectAlt('${sku}', '${url.replace(/'/g,"\\'")}', this)">
        <img src="${url}" loading="lazy" onerror="this.parentElement.style.display='none'">
      </div>`
    ).join('');
    altPicker.classList.add('show');
    // Auto-select first
    selectAlt(sku, results[0]);
  }
}

function selectAlt(sku, url, el) {
  const p = S.products.find(x => x.sku === sku);
  if (!p) return;
  p.imageUrl = url;
  // Update input field
  const skuId = sku.replace(/[^a-zA-Z0-9]/g,'_');
  const inp = document.getElementById('url-' + skuId);
  if (inp) inp.value = url;
  // Highlight selected
  document.querySelectorAll(`#altgrid-${skuId} .alt-img`).forEach(el => el.classList.remove('selected'));
  if (el) el.classList.add('selected');
  updateCard(sku);
  toast(`✓ Photo set for ${p.name}`, 'ok');
}

function manualUrl(sku, url) {
  const p = S.products.find(x => x.sku === sku);
  if (!p || !url) return;
  url = url.trim();
  if (!url.startsWith('http')) { toast('Please enter a valid URL (starts with http)', 'err'); return; }
  p.imageUrl = url;
  updateCard(sku);
  toast('Photo URL saved!', 'ok');
}

function clearPhoto(sku) {
  const p = S.products.find(x => x.sku === sku);
  if (!p) return;
  p.imageUrl = '';
  updateCard(sku);
  toast('Photo cleared', 'info');
}

function imgError(sku) {
  const p = S.products.find(x => x.sku === sku);
  if (p) p.imageUrl = '';
  updateStats();
}

/* ══════════════════════════════════════
   SEARCH ENGINE
   Multi-source image search strategy:
   1. Try multiple public image APIs
   2. Build search URL based on product name
   3. Return array of candidate image URLs
══════════════════════════════════════ */
async function searchImages(product) {
  const query = buildQuery(product);
  const results = [];

  // Strategy 1: Use Unsplash Source (food images, no API key needed)
  // This gives high-quality food/product photos
  const unsplashUrl = `https://source.unsplash.com/400x400/?${encodeURIComponent(query + ' food')},transparent`;
  results.push(unsplashUrl);

  // Strategy 2: Use Wikipedia/Wikimedia for branded products
  // Many Indonesian food brands have Wikimedia images
  try {
    const wikiQuery = encodeURIComponent(product.name.split(' ').slice(0, 3).join(' '));
    const wikiUrl = `https://en.wikipedia.org/w/api.php?action=query&titles=${wikiQuery}&prop=pageimages&format=json&pithumbsize=400&origin=*`;
    const wikiRes = await fetch(wikiUrl);
    const wikiData = await wikiRes.json();
    const pages = wikiData?.query?.pages || {};
    for (const page of Object.values(pages)) {
      if (page.thumbnail?.source) results.push(page.thumbnail.source);
    }
  } catch {}

  // Strategy 3: OpenFoodFacts for packaged foods
  try {
    // Extract brand from product name (first word often = brand)
    const brand = product.name.split(' ')[0];
    const offUrl = `https://world.openfoodfacts.org/cgi/search.pl?search_terms=${encodeURIComponent(product.name)}&search_simple=1&action=process&json=1&page_size=5`;
    const offRes = await fetch(offUrl);
    const offData = await offRes.json();
    if (offData?.products) {
      offData.products.forEach(item => {
        if (item.image_url) results.push(item.image_url);
        if (item.image_front_url) results.push(item.image_front_url);
        if (item.image_front_small_url) results.push(item.image_front_small_url);
      });
    }
  } catch {}

  // Strategy 4: Wikimedia Commons search
  try {
    const commonsUrl = `https://commons.wikimedia.org/w/api.php?action=query&generator=search&gsrsearch=${encodeURIComponent(query)}&gsrnamespace=6&prop=imageinfo&iiprop=url&iiurlwidth=400&format=json&origin=*`;
    const commonsRes = await fetch(commonsUrl);
    const commonsData = await commonsRes.json();
    const commPages = commonsData?.query?.pages || {};
    for (const page of Object.values(commPages)) {
      const url = page?.imageinfo?.[0]?.thumburl;
      if (url && url.match(/\.(jpg|jpeg|png|webp)/i)) results.push(url);
    }
  } catch {}

  // Strategy 5: Curated fallback images by category
  const categoryFallbacks = {
    'Spice / Bumbu': [
      'https://images.unsplash.com/photo-1596040033229-a9821ebd058d?w=400',
      'https://images.unsplash.com/photo-1506368249639-73a05d6f6488?w=400',
      'https://images.unsplash.com/photo-1532336414038-cf19250c5757?w=400',
    ],
    'Instant Food': [
      'https://images.unsplash.com/photo-1569718212165-3a8278d5f624?w=400',
      'https://images.unsplash.com/photo-1612929633738-8fe44f7ec841?w=400',
    ],
    'Frozen Meat': [
      'https://images.unsplash.com/photo-1607623814075-e51df1bdc82f?w=400',
      'https://images.unsplash.com/photo-1603048297172-c92544798d5a?w=400',
    ],
    'Drinks': [
      'https://images.unsplash.com/photo-1544145945-f90425340c7e?w=400',
      'https://images.unsplash.com/photo-1625772299848-391b6a87d7b3?w=400',
    ],
    'Grocery': [
      'https://images.unsplash.com/photo-1542838132-92c53300491e?w=400',
      'https://images.unsplash.com/photo-1599599810769-bcde5a160d32?w=400',
    ],
    'Snack': [
      'https://images.unsplash.com/photo-1621939514649-280e2ee25f60?w=400',
      'https://images.unsplash.com/photo-1582515073490-39981397c445?w=400',
    ],
    'Health & Medicine': [
      'https://images.unsplash.com/photo-1584308666744-24d5c474f2ae?w=400',
      'https://images.unsplash.com/photo-1471864190281-a93a3070b6de?w=400',
    ],
    'Restaurant': [
      'https://images.unsplash.com/photo-1512058564366-18510be2db19?w=400',
      'https://images.unsplash.com/photo-1569050467447-ce54b3bbc37d?w=400',
    ],
  };
  const fallbacks = categoryFallbacks[product.cat] || ['https://images.unsplash.com/photo-1542838132-92c53300491e?w=400'];
  results.push(...fallbacks);

  // Deduplicate
  return [...new Set(results)].filter(Boolean);
}

function buildQuery(product) {
  // Smart query builder — handles Indonesian product names
  const name = product.name;
  // Map common Indonesian terms to English for better search results
  const translations = {
    'ayam': 'chicken', 'sapi': 'beef', 'domba': 'lamb', 'bebek': 'duck',
    'ikan': 'fish', 'udang': 'shrimp', 'bakso': 'meatball',
    'bumbu': 'spice paste', 'sambal': 'chili sauce', 'kecap': 'soy sauce',
    'santan': 'coconut milk', 'gula merah': 'palm sugar',
    'mie': 'noodle', 'nasi': 'rice', 'goreng': 'fried',
    'rendang': 'rendang beef', 'soto': 'indonesian soup',
    'frozen': 'frozen', 'instan': 'instant',
  };
  let query = name.toLowerCase();
  for (const [id, en] of Object.entries(translations)) {
    query = query.replace(new RegExp(id, 'g'), en);
  }
  return query.substring(0, 50);
}

/* ══════════════════════════════════════
   FIND ALL PHOTOS (bulk)
══════════════════════════════════════ */
let stopRequested = false;
async function findAllPhotos() {
  const noImg = S.products.filter(p => !p.imageUrl);
  if (!noImg.length) { toast('All products already have photos! 🎉', 'ok'); return; }

  if (!confirm(`Find photos for ${noImg.length} products without images?\n\nThis will take about ${Math.ceil(noImg.length * 1.5)} seconds.`)) return;

  stopRequested = false;
  S.searching = true;
  document.getElementById('btn-stop').style.display = '';
  document.getElementById('progress-wrap').classList.add('show');

  let done = 0;
  for (const p of noImg) {
    if (stopRequested) break;
    document.getElementById('progress-label').textContent = `Finding: ${p.name}`;
    document.getElementById('progress-pct').textContent = `${Math.round(done/noImg.length*100)}%`;
    document.getElementById('progress-fill').style.width = `${Math.round(done/noImg.length*100)}%`;

    const results = await searchImages(p);
    if (results.length > 0) {
      p.imageUrl = results[0];
      updateCard(p.sku);
    }
    done++;
    await new Promise(r => setTimeout(r, 400)); // Rate limit
  }

  S.searching = false;
  document.getElementById('btn-stop').style.display = 'none';
  document.getElementById('progress-wrap').classList.remove('show');
  saveLocal();
  filterProds();
  toast(`Done! ${S.products.filter(p=>p.imageUrl).length} products now have photos.`, 'ok');
}

function stopSearch() { stopRequested = true; toast('Search stopped.', 'info'); }

function updateStats() {
  const withImg = S.products.filter(p => p.imageUrl).length;
  const total = S.products.length;
  document.getElementById('stat-with-img').textContent = withImg;
  document.getElementById('stat-pct').textContent = Math.round(withImg/total*100) + '%';
}

══════════════════════════════════════ */
function showExport() {
  const withImg = S.products.filter(p => p.imageUrl);
  if (!withImg.length) { toast('No photos to export yet!', 'err'); return; }

  // Generate JS object for easy paste into POS/Store files
  const lines = withImg.map(p => `  "${p.sku}": "${p.imageUrl}"`).join(',\n');
  const code =
`// KHF Product Images — Generated ${new Date().toLocaleDateString()}
// ${withImg.length} products with photos
// Paste this into your HTML files and call: applyProductImages(PRODUCT_IMAGES)

const PRODUCT_IMAGES = {
${lines}
};

// Apply images to ALL_PRODUCTS array
function applyProductImages(imageMap) {
  if (typeof ALL_PRODUCTS !== 'undefined') {
    ALL_PRODUCTS.forEach(p => {
      if (imageMap[p.sku]) p.image = imageMap[p.sku];
    });
  }
}

// Auto-apply on load
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', () => applyProductImages(PRODUCT_IMAGES));
} else {
  applyProductImages(PRODUCT_IMAGES);
}`;

  document.getElementById('export-code').textContent = code;
  document.getElementById('export-mo').classList.add('open');
}

function closeMo() { document.getElementById('export-mo').classList.remove('open'); }

function copyExport() {
  const code = document.getElementById('export-code').textContent;
  navigator.clipboard.writeText(code)
    .then(() => toast('Copied to clipboard!', 'ok'))
    .catch(() => toast('Copy failed — please select and copy manually', 'err'));
}

function downloadExport() {
  const code = document.getElementById('export-code').textContent;
  const blob = new Blob([code], { type: 'text/javascript' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'khf_product_images.js'; a.click();
  URL.revokeObjectURL(url);
  toast('Downloaded khf_product_images.js', 'ok');
}

/* ══════════════════════════════════════
   SAVE TO SHEETS (via Apps Script)
══════════════════════════════════════ */
async function saveToSheets() {
  if (CFG.USE_MOCK) {
    toast('Connect Apps Script URL first in CFG.SCRIPT_URL', 'info');
    return;
  }
  const withImg = S.products.filter(p => p.imageUrl).map(p => ({sku: p.sku, imageUrl: p.imageUrl}));
  if (!withImg.length) { toast('No images to save', 'err'); return; }
  toast('Saving to Google Sheets…', 'info');
  try {
    const res = await fetch(CFG.SCRIPT_URL, {
      method: 'POST',
      headers: {'Content-Type': 'text/plain'},
      body: JSON.stringify({ action: 'updateProductImages', payload: withImg }),
    });
    const data = await res.json();
    if (data.ok) toast(`Saved ${withImg.length} image URLs to Sheets!`, 'ok');
    else toast('Error: ' + data.error, 'err');
  } catch (e) {
    toast('Connection failed: ' + e.message, 'err');
  }
}

/* ══════════════════════════════════════
   TOAST
══════════════════════════════════════ */
function toast(msg, type='ok') {
  const el = document.getElementById('toast');
  el.textContent = (type==='ok'?'✓ ':type==='err'?'✕ ':'ℹ ') + msg;
  el.className = 'toast show ' + type;
  clearTimeout(toast._t);
  toast._t = setTimeout(() => el.classList.remove('show'), 3000);
}
</script>
